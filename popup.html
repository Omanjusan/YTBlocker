<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTBlocker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      background: #fff;
      color: #0f0f0f;
    }
    .header {
      background: #ff0000;
      color: #fff;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .body { padding: 16px; }
    .stat {
      font-size: 13px;
      color: #606060;
      margin-bottom: 16px;
    }
    .stat span { font-weight: bold; color: #0f0f0f; }
    button {
      width: 100%;
      padding: 8px 12px;
      background: #065fd4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #0356c4; }
  </style>
</head>
<body>
  <div class="header">YTBlocker</div>
  <div class="body">
    <p class="stat">ブロック中: <span id="count">…</span> 件</p>
    <button id="open-options">設定を開く</button>
  </div>
  <script src="dist/popup.js"></script>
</body>
</html>
